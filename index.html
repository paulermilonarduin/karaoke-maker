<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Karaoke Maker</title>
    <style>
      :root {
        --splash-bg: #101413;
        --splash-accent: #7bd2bd;
        --splash-text: #fffaf0;
      }

      @property --highlight-progress {
        syntax: "<percentage>";
        inherits: false;
        initial-value: 0%;
      }

      html,
      body,
      #app {
        min-width: 320px;
        min-height: 100%;
        margin: 0;
        background: var(--splash-bg);
      }

      body {
        min-height: 100vh;
        color: var(--splash-text);
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      .app-loading {
        display: grid;
        min-height: 100vh;
        place-items: center;
        background:
          radial-gradient(circle at 50% 44%, rgba(123, 210, 189, 0.12), transparent 34%),
          var(--splash-bg);
      }

      .app-loading__logo {
        display: inline-block;
        padding: 0.16em 0.4em 0.2em 0.32em;
        border: 1px solid var(--splash-accent);
        border-radius: 8px;
        background: var(--splash-bg);
        font-size: clamp(2rem, 6vw, 4.75rem);
        font-weight: 950;
        letter-spacing: -0.07em;
        line-height: 0.98;
        transform: skewX(-5deg);
        transform-origin: left center;
        white-space: nowrap;
      }

      .app-loading__highlight {
        --highlight-progress: 0%;

        position: relative;
        display: inline-block;
        padding-right: 0.12em;
        background: linear-gradient(
          90deg,
          var(--splash-accent) 0%,
          var(--splash-accent) var(--highlight-progress),
          var(--splash-text) var(--highlight-progress),
          var(--splash-text) 100%
        );
        background-clip: text;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: app-loading-highlight 5.4s linear infinite;
      }

      .app-loading__highlight::after {
        position: absolute;
        inset: 0;
        color: var(--splash-accent);
        content: attr(data-text);
        clip-path: inset(-18px calc(100% - var(--highlight-progress)) -18px 0);
        pointer-events: none;
        text-shadow:
          0 0 4px rgba(123, 210, 189, 0.62),
          0 0 10px rgba(123, 210, 189, 0.18);
        -webkit-text-fill-color: var(--splash-accent);
      }

      @keyframes app-loading-highlight {
        from {
          --highlight-progress: 0%;
        }

        to {
          --highlight-progress: 100%;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .app-loading__highlight {
          --highlight-progress: 65%;
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="app-loading" role="status" aria-label="Chargement de Karaoke Maker">
        <span class="app-loading__logo" role="img" aria-label="Karaoke Maker">
          <span class="app-loading__highlight" data-text="KARAOKE MAKER">KARAOKE MAKER</span>
        </span>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
